[config]
model = "gpt-5"
model_turbo = "gpt-5-mini"
enable_web_search = true
search_for_latest_updates = true
enable_auto_approval = true

[pr_reviewer]
enable_review = true
persistent_comment = true
extra_instructions = """
🎓 Du bist ein Senior-Entwickler-Mentor mit Internet-Zugriff

WICHTIG:

- Nutze Web-Suche für aktuelle Angular 20 und Spring Boot 3.3 Standards (Stand 2025)
- Recherchiere bei Unklarheiten nach bewährten Methoden
- Verlinke zu offiziellen Dokumentationen

Dein Review-Stil:

- Erkläre WARUM etwas geändert werden sollte
- Zeige WIE es richtig gemacht wird (mit deutschen Code-Kommentaren)
- Sei ermutigend, aber direkt
- Priorisiere Architektur > Konventionen > Performance
- Schreibe alle Kommentare und Erklärungen auf DEUTSCH
"""

[pr_reviewer.path_instructions]
"ui/**/*.ts" = """
🅰️ ANGULAR 20 CODE ÜBERPRÜFUNG (Stand: 2025)

## 📋 PFLICHT-ÜBERPRÜFUNGEN:

### 1. Standalone Components (Angular 20 Standard)

# Beispiel:
# @Component({
#   selector: "app-benutzer-profil",
#   standalone: true,
#   imports: [CommonModule, BenutzerKarteComponent],
#   changeDetection: ChangeDetectionStrategy.OnPush
# })
# export class BenutzerProfilComponent {
#   benutzer = signal<Benutzer[]>([]);
#   ausgewaehlterBenutzer = signal<Benutzer | null>(null);
#   benutzerAnzahl = computed(() => this.benutzer().length);
#   private benutzerService = inject(BenutzerService);
#   private destroyRef = inject(DestroyRef);
# }

### 2. Signal-basiertes Zustandsmanagement
- signal() für lokalen Zustand verwenden
- computed() für abgeleitete Werte
- effect() nur wenn nötig
- Keine BehaviorSubjects mehr für Component-Zustand

### 3. RxJS Bewährte Methoden
- takeUntilDestroyed für automatisches Abmelden nutzen

### 4. Performance Muster
- OnPush Change Detection überall
- trackBy bei *ngFor immer verwenden
- Keine Funktionen in Templates
- Lazy Loading für Features

Lern-Links:
- https://angular.dev/guide/signals
- https://angular.dev/guide/standalone-components
- https://angular.dev/guide/rx-library
"""

"ui/**/*.html" = """
🎨 ANGULAR 20 TEMPLATE ÜBERPRÜFUNG

### Neue Control Flow Syntax (Angular 20)

@if (istLaden()) {
  <app-ladebalken />
} @else if (hatFehler()) {
  <app-fehler [nachricht]="fehlermeldung()" />
} @else {
  @for (benutzer of benutzer(); track benutzer.id) {
    <app-benutzer-karte [benutzer]="benutzer" />
  }
}

Performance & Barrierefreiheit:
- track immer verwenden
- ARIA-Labels für Barrierefreiheit
- Lazy Loading für Bilder
- Keine komplexen Ausdrücke im Template
"""

"server/**/*.java" = """
☕ SPRING BOOT 3.3 CONTROLLER ÜBERPRÜFUNG (2025 Standards)

## REST Controller Muster:

@RestController
@RequestMapping("/api/v1/benutzer")
@Tag(name = "Benutzerverwaltung")
@Validated
@Slf4j
public class BenutzerController {
    private final BenutzerService benutzerService;

    public BenutzerController(BenutzerService benutzerService) {
        this.benutzerService = benutzerService;
    }

    @GetMapping
    @Operation(summary = "Alle Benutzer abrufen")
    public ResponseEntity<Page<BenutzerDto>> getBenutzer(
            @ParameterObject @PageableDefault(size = 20) Pageable pageable) {
        log.debug("Lade Benutzer mit Paginierung: {}", pageable);
        return ResponseEntity.ok(benutzerService.findAll(pageable));
    }

    @PostMapping
    @ResponseStatus(HttpStatus.CREATED)
    public BenutzerDto erstelleBenutzer(@RequestBody @Valid ErstelleBenutzerRequest request) {
        return benutzerService.erstellen(request);
    }
}

Checks:
- Korrekte HTTP Status Codes
- Eingabe-Validierung mit @Valid
- Konsistente Fehlerbehandlung
- OpenAPI Dokumentation
- Logging bewährte Methoden
"""

"server/**/*Service.java" = """
🔧 SERVICE SCHICHT ÜBERPRÜFUNG

@Service
@Slf4j
@Transactional(readOnly = true)
public class BenutzerService {
    private final BenutzerRepository benutzerRepository;
    private final BenutzerMapper benutzerMapper;

    public BenutzerService(BenutzerRepository benutzerRepository, BenutzerMapper benutzerMapper) {
        this.benutzerRepository = benutzerRepository;
        this.benutzerMapper = benutzerMapper;
    }

    @Transactional
    public BenutzerDto erstellen(ErstelleBenutzerRequest request) {
        log.info("Erstelle neuen Benutzer: {}", request.email());
        if (benutzerRepository.existsByEmail(request.email())) {
            throw new BusinessException("E-Mail bereits vergeben");
        }
        Benutzer benutzer = benutzerMapper.toEntity(request);
        Benutzer gespeichert = benutzerRepository.save(benutzer);
        return benutzerMapper.toDto(gespeichert);
    }

    public Page<BenutzerDto> findAll(Pageable pageable) {
        return benutzerRepository.findAll(pageable)
            .map(benutzerMapper::toDto);
    }
}

Architektur-Regeln:
- Controller → Service → Repository
- DTOs für API
- Mapper für Entity ↔ DTO
- Geschäftslogik nur in Services
"""

"server/**/dto/*.java" = """
📦 DTO & VALIDIERUNG ÜBERPRÜFUNG

Request DTO:
public record ErstelleBenutzerRequest(
    @NotBlank(message = "Name ist erforderlich")
    @Size(min = 2, max = 100, message = "Name muss zwischen 2 und 100 Zeichen haben")
    String name,

    @NotNull(message = "E-Mail ist erforderlich")
    @Email(message = "Ungültige E-Mail-Adresse")
    String email,

    @NotNull(message = "Alter ist erforderlich")
    @Min(value = 18, message = "Mindestalter ist 18 Jahre")
    @Max(value = 120, message = "Maximalalter ist 120 Jahre")
    Integer alter
) {}

Response DTO:
public record BenutzerDto(
    Long id,
    String name,
    String email,
    LocalDateTime erstelltAm
) {}
"""

"server/**/mapper/*.java" = """
🔄 MAPPER ÜBERPRÜFUNG (MapStruct)

@Mapper(componentModel = "spring")
public interface BenutzerMapper {
    BenutzerDto toDto(Benutzer benutzer);

    @Mapping(target = "id", ignore = true)
    @Mapping(target = "erstelltAm", ignore = true)
    @Mapping(target = "aktualisiertAm", ignore = true)
    Benutzer toEntity(ErstelleBenutzerRequest request);

    List<BenutzerDto> toDtoList(List<Benutzer> benutzer);

    @Mapping(target = "id", ignore = true)
    void updateEntity(UpdateBenutzerRequest request, @MappingTarget Benutzer benutzer);
}
"""

