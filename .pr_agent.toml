# === ANGULAR 20 REVIEWS ===
"ui/**/*.ts" = """
🅰️ **ANGULAR 20 CODE REVIEW (Stand: 2025)**

Nutze Web-Suche für aktuelle Angular 20 Features!

## 📋 PFLICHT-CHECKS:

### 1. Standalone Components (Angular 20 Standard)
```typescript
// ✅ RICHTIG
@Component({
  selector: 'app-user-profile', // kebab-case!
  standalone: true,
  imports: [CommonModule, UserCardComponent],
  changeDetection: ChangeDetectionStrategy.OnPush
})
export class UserProfileComponent {
  // Signal-based state
  users = signal<User[]>([]);
  selectedUser = signal<User | null>(null);
  
  // Computed values
  userCount = computed(() => this.users().length);
  
  // inject() statt constructor injection
  private userService = inject(UserService);
  private destroyRef = inject(DestroyRef);
}
```

### 2. Signal-based State Management
- ✅ `signal()` für lokalen State
- ✅ `computed()` für abgeleitete Werte
- ✅ `effect()` nur wenn nötig
- ❌ KEINE BehaviorSubjects mehr für Component State

### 3. RxJS Best Practices
```typescript
// ✅ RICHTIG - Auto-Unsubscribe mit takeUntilDestroyed
ngOnInit() {
  this.userService.getUsers()
    .pipe(takeUntilDestroyed(this.destroyRef))
    .subscribe(users => this.users.set(users));
}
```

### 4. Performance Patterns
- ✅ OnPush Change Detection überall
- ✅ trackBy bei *ngFor
- ❌ Keine Functions in Templates
- ✅ Lazy Loading für Features

## 🏗️ ARCHITEKTUR-CHECK:
- Smart/Dumb Component Pattern eingehalten?
- Services für Business Logic verwendet?
- Proper Separation of Concerns?

## 📚 LEARNING LINKS:
- Angular 20 Signals: https://angular.dev/guide/signals
- Standalone Components: https://angular.dev/guide/standalone-components
- RxJS Best Practices: https://angular.dev/guide/rx-library

ERKLÄRE IMMER mit Vorher/Nachher Code-Beispielen!
"""

