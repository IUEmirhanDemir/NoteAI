# === JAVA SPRING BOOT REVIEWS ===
"server/**/controller/**/*.java" = """
☕ **SPRING BOOT CONTROLLER REVIEW (2025 Standards – Version 3.3)**

## REST Controller Pattern:
```java
@RestController
@RequestMapping("/api/v1/users")
@Tag(name = "User Management") // OpenAPI
@Validated
@Slf4j
public class UserController {
    
    private final UserService userService;
    
    // ✅ Constructor Injection (Best Practice)
    public UserController(UserService userService) {
        this.userService = userService;
    }
    
    @GetMapping
    @Operation(summary = "Get all users")
    public ResponseEntity<Page<UserDto>> getUsers(
            @ParameterObject @PageableDefault(size = 20) Pageable pageable) {
        log.debug("Fetching users with pagination: {}", pageable);
        return ResponseEntity.ok(userService.findAll(pageable));
    }
    
    @PostMapping
    @ResponseStatus(HttpStatus.CREATED)
    public UserDto createUser(@RequestBody @Valid CreateUserRequest request) {
        return userService.create(request);
    }
}
```

## CHECKS:
- ✅ Proper HTTP Status Codes
- ✅ Input Validation mit @Valid
- ✅ Consistent Error Handling
- ✅ OpenAPI Documentation
- ✅ Logging Best Practices

Verlinke zu Spring Docs wenn relevant! (z. B. https://spring.io/projects/spring-boot)
"""

"server/**/service/**/*.java" = """
🔧 **SERVICE LAYER REVIEW**

## Service Pattern für deine Architektur:
```java
@Service
@Slf4j
@Transactional(readOnly = true) // Default read-only
public class UserService {
    
    private final UserRepository userRepository;
    private final UserMapper userMapper;
    
    // Constructor injection
    public UserService(UserRepository userRepository, UserMapper userMapper) {
        this.userRepository = userRepository;
        this.userMapper = userMapper;
    }
    
    @Transactional // Write operation
    public UserDto create(CreateUserRequest request) {
        log.info("Creating new user: {}", request.email());
        
        // Business logic & validation
        if (userRepository.existsByEmail(request.email())) {
            throw new BusinessException("Email bereits vergeben");
        }
        
        User user = userMapper.toEntity(request);
        User saved = userRepository.save(user);
        
        return userMapper.toDto(saved);
    }
    
    // Query methods bleiben read-only
    public Page<UserDto> findAll(Pageable pageable) {
        return userRepository.findAll(pageable)
            .map(userMapper::toDto);
    }
}
```

## ARCHITEKTUR-REGELN für dein Setup:
- Controller → Service → Repository
- DTOs für API Communication
- Mapper für Entity ↔ DTO Conversion
- Business Logic NUR im Service Layer!
"""

"server/**/dto/**/*.java" = """
📦 **DTO & VALIDATION REVIEW**

## Modern DTOs mit Records (Java 17+):
```java
// ✅ Request DTO mit Validation
public record CreateUserRequest(
    @NotBlank(message = "Name ist erforderlich")
    @Size(min = 2, max = 100)
    String name,
    
    @NotNull
    @Email(message = "Ungültige E-Mail-Adresse")
    String email,
    
    @NotNull
    @Min(18)
    @Max(120)
    Integer age
) {
    // Custom validation wenn nötig
    public CreateUserRequest {
        if (name != null) {
            name = name.trim();
        }
    }
}

// ✅ Response DTO
public record UserDto(
    Long id,
    String name,
    String email,
    LocalDateTime createdAt
) {}
```

## CHECKS:
- ✅ Bean Validation Annotations
- ✅ Meaningful Error Messages
- ✅ Immutable DTOs (Records)
- ✅ No Business Logic in DTOs
"""

"server/**/mapper/**/*.java" = """
🔄 **MAPPER REVIEW (MapStruct Best Practices)**

```java
@Mapper(componentModel = "spring")
public interface UserMapper {
    
    // Entity → DTO
    UserDto toDto(User user);
    
    // DTO → Entity
    @Mapping(target = "id", ignore = true)
    @Mapping(target = "createdAt", ignore = true)
    @Mapping(target = "updatedAt", ignore = true)
    User toEntity(CreateUserRequest request);
    
    // Collection mapping
    List<UserDto> toDtoList(List<User> users);
    
    // Update existing entity
    @Mapping(target = "id", ignore = true)
    void updateEntity(UpdateUserRequest request, @MappingTarget User user);
}
```

Prüfe:
- ✅ Keine manuellen Mappings
- ✅ Proper null handling
- ✅ Consistent naming
"""

