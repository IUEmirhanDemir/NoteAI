### 3️⃣ **Trigger-Kommentare für manuelle Reviews**

In jedem Pull Request (PR) können Sie kommentieren:  
- `/review` – Vollständiges Review  
- `/improve` – Code-Verbesserungen vorschlagen  
- `/describe` – PR-Beschreibung generieren  
- `/ask <Frage>` – Spezifische Fragen mit Web-Recherche beantworten  

