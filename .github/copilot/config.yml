# Datei: .github/copilot/config.yml
version: 1

rules:
  - name: "Pull Request Review"
    description: "Copilot überprüft Pull Requests wie ein Senior-Mentor (Deutsch, strukturierte Reviews mit Tasks und Zeilenkommentaren)."
    triggers:
      - "pull_request"
      - "pull_request_review_requested"
      - "pull_request.synchronize"

    actions:
      - type: "review"
        language: "de"
        style:
          - "freundlich"
          - "konstruktiv"
          - "didaktisch"
        focus:
          - "Codequalität"
          - "Lesbarkeit"
          - "Best Practices"
          - "Fehler oder mögliche Bugs"
          - "Verbesserungsvorschläge"

        structure:
          require_all_sections: true
          sections_in_order:
            - "🎉 Positive Aspekte"
            - "🔧 Framework-Updates & Modernisierung"
            - "📋 Mentor-Tasks"
            - "🧩 Zeilenkommentare (Explizit)"
            - "💡 Mentor-Erklärungen"
            - "🔗 Weiterführende Links"
            - "📊 Code-Qualität Bewertung"
            - "✅ Performance-Checks"
            - "♿ Accessibility-Checks"
            - "🔐 Security-Checks"

        tasks:
          require_checkbox_format: true
          line_task_format: "- [ ] [<pfad>:<zeile>] <Aufgabe> — WHY — How-To — (Effort: S|M|L)"
          min_critical_tasks: 1
          allowed_efforts: ["S", "M", "L"]
          require_line_comments_for: ["CRITICAL", "HIGH"]

        suggestions:
          enable_github_suggestion_blocks: true

        links:
          require_official_sources: true
          min_links_when_claiming_best_practice: 1

        limits:
          max_total_comments: 30
          group_similar_findings: true
          update_previous_bot_comment: true   # ersetzt anstatt zu spammen

        placeholders:
          missing_path_line_format: "[<pfad>:<zeile?>] [unbestätigt]"

      - type: "line_comments"
        strategy: "only_critical_and_high"
        suggestion_blocks: true

      - type: "labels"
        add_on_severity:
          CRITICAL: ["severity:critical"]
          HIGH: ["severity:high"]
          MEDIUM: ["severity:medium"]
          LOW: ["severity:low"]

      - type: "ask_for_context"
        when: "missing_info_detected"
        questions:
          - "Bitte nenne betroffene Dateien/Zeilen oder bestätige Platzhalter."
          - "Welche Zielplattform/Framework-Versionen sind maßgeblich?"
          - "Gibt es Performance- oder Security-Anforderungen (SLAs, OWASP/CVEs)?"

    paths:
      include:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.java"
        - "**/*.py"
        - "**/*.go"
        - "**/*.cs"
        - "**/*.css"
        - "**/*.html"
        - "**/*.rb"
        - "**/*.php"
        - "**/*.md"
        - "**/*.yml"
      exclude:
        - "**/dist/**"
        - "**/build/**"
        - "**/vendor/**"
        - "**/node_modules/**"
