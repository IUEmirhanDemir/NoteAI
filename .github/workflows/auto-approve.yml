  - name: Decide action (no auto-merge)
    run: |
      pr_number="${{ steps.pr-details.outputs.number }}"
      pr_author="${{ steps.pr-details.outputs.author }}"
      pr_labels="${{ steps.pr-details.outputs.labels }}"
      head_repo="${{ steps.pr-details.outputs.head-repo }}"
      pr_state="${{ steps.pr-details.outputs.state }}"
      repo="${{ github.repository }}"

      echo "🔍 PR #$pr_number by $pr_author from $head_repo"
      echo "📊 Labels: $pr_labels"
      echo "📈 State: $pr_state"

      # Sicherheitscheck: Keine Forks
      if [ "$head_repo" != "$repo" ]; then
        echo "❌ PR ist von einem Fork - überspringe aus Sicherheitsgründen"
        exit 0
      fi

      # Prüfe ob PR offen ist
      if [ "$pr_state" != "open" ]; then
        echo "ℹ️ PR ist nicht offen (State: $pr_state) - überspringe"
        exit 0
      fi

      # Verhalten:
      # - Eigener Benutzer: keine automatische Aktion (nur Info)
      # - Copilot-Label: approve (kein Merge)
      # - Sonst: keine Aktion
      if [ "$pr_author" = "$ALLOWED_USER" ]; then
        echo "ℹ️ Eigener PR erkannt: $pr_author — keine automatische Aktion (kein approve, kein merge)."
        exit 0
      fi

      if echo "$pr_labels" | grep -q "$COPILOT_LABEL"; then
        echo "✅ Copilot-Label gefunden: $COPILOT_LABEL — versuche, PR zu approven (kein Merge)."

        approve_response=$(curl -s -w "%{http_code}" \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$repo/pulls/$pr_number/reviews" \
          -d '{"event":"APPROVE","body":"🤖 Auto-approved: Copilot-Label erkannt"}')

        approve_code="${approve_response: -3}"
        approve_body="${approve_response%???}"

        echo "📊 Approval HTTP Status: $approve_code"

        if [ "$approve_code" -ge 200 ] && [ "$approve_code" -lt 300 ]; then
          echo "🎉 PR #$pr_number wurde erfolgreich approved (kein Merge)."
          exit 0
        else
          echo "❌ Approval fehlgeschlagen (HTTP $approve_code):"
          echo "$approve_body" | jq -r '.message // .' 2>/dev/null || echo "$approve_body"
          # Keine Merge-Aktion: Fehler melden, aber Workflow insgesamt mit Fehler beenden
          exit 1
        fi
      else
        echo "❌ Keine Aktionsbedingung erfüllt."
        echo "💡 Tipp: Füge das Label '$COPILOT_LABEL' hinzu, damit Copilot-PRs automatisch approved werden. Eigene PRs werden nicht automatisch approved oder gemerged."
        exit 0
      fi
