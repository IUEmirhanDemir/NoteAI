name: Auto-approve (Label-basiert; kein Merge)

on:
  pull_request_target:
    types: [opened, edited, labeled, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

env:
  # Eigene PRs nie auto-approven:
  ALLOWED_USER: IUEmirhanDemir
  # Nur PRs mit diesem Label werden auto-approved:
  APPROVE_LABEL: copilot

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Nur interne, offene PRs (nicht vom ALLOWED_USER)
        id: gate
        if: >
          ${{
            github.event.pull_request.state == 'open' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.user.login != env.ALLOWED_USER
          }}
        run: echo "OK"

      - name: Approve per API, wenn Label vorhanden (kein Merge)
        if: ${{ steps.gate.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PATH: ${{ github.event_path }}
          APPROVE_LABEL: ${{ env.APPROVE_LABEL }}
        run: |
          labels=$(jq -r '.pull_request.labels[].name // empty' "$EVENT_PATH")
          echo "Labels: $labels"
          echo "$labels" | grep -Fxq "$APPROVE_LABEL" || { echo "Kein '$APPROVE_LABEL' Label – skip."; exit 0; }

          echo "Approving PR #$PR_NUMBER in $REPO …"
          payload=$(jq -n --arg body "🤖 Auto-Approve: Label '$APPROVE_LABEL' gesetzt." '{event:"APPROVE", body:$body}')
          http=$(curl -s -w "%{http_code}" -o /tmp/res.json \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -X POST "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
            -d "$payload")

          echo "HTTP: $http"
          if [ "$http" -lt 200 ] || [ "$http" -ge 300 ]; then
            echo "Fehler beim Approve:"
            cat /tmp/res.json || true
            exit 1
          fi
          echo "✅ Approved (kein Merge)."
