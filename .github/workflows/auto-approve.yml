name: Auto-approve (Copilot only; no auto-merge)

on:
  pull_request_target:
    types: [opened, edited, labeled, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

env:
  # Dein eigener Account: Eigene PRs NICHT auto-approven
  ALLOWED_USER: IUEmirhanDemir
  # Label, das Copilot-PRs markiert (bei Bedarf umbenennen)
  COPILOT_LABEL: copilot

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Load PR details
        id: pr
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "state=${{ github.event.pull_request.state }}" >> $GITHUB_OUTPUT
          echo "base_repo=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}" >> $GITHUB_OUTPUT
          labels=$(jq -r '.pull_request.labels[].name // empty' "$GITHUB_EVENT_PATH" | paste -sd "," -)
          echo "labels=$labels" >> $GITHUB_OUTPUT

      - name: Approve if copilot label (no merge)
        if: >
          ${{
            steps.pr.outputs.state == 'open' &&
            steps.pr.outputs.head_repo == steps.pr.outputs.base_repo &&
            steps.pr.outputs.author != env.ALLOWED_USER &&
            contains( format(',{0},', steps.pr.outputs.labels ), format(',{0},', env.COPILOT_LABEL) )
          }}
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: "🤖 Auto-approved: '${{ env.COPILOT_LABEL }}' label present."
