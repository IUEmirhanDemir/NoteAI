name: Auto-approve PR
on:
  pull_request_target:
    types: [opened, edited, labeled, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ALLOWED_USER: "IUEmirhanDemir"
      COPILOT_LABEL: "copilot-approved"
    steps:
      - name: Load PR details
        id: pr-details
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "head-repo=${{ github.event.pull_request.head.repo.full_name }}" >> $GITHUB_OUTPUT
          
          # Labels extrahieren
          labels=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | jq -r 'join(",")')
          echo "labels=$labels" >> $GITHUB_OUTPUT
      
      - name: Auto approve
        run: |
          pr_number="${{ steps.pr-details.outputs.number }}"
          pr_author="${{ steps.pr-details.outputs.author }}"
          pr_labels="${{ steps.pr-details.outputs.labels }}"
          head_repo="${{ steps.pr-details.outputs.head-repo }}"
          repo="${{ github.repository }}"
          
          echo "PR #$pr_number by $pr_author from $head_repo"
          echo "Labels: $pr_labels"
          
          # Sicherheitscheck: Keine Forks
          if [ "$head_repo" != "$repo" ]; then
            echo "❌ PR ist von einem Fork - überspringe aus Sicherheitsgründen"
            exit 0
          fi
          
          # Prüfe Bedingungen
          should_approve=false
          if [ "$pr_author" = "$ALLOWED_USER" ]; then
            echo "✅ Author ist berechtigt: $pr_author"
            should_approve=true
          elif echo "$pr_labels" | grep -q "$COPILOT_LABEL"; then
            echo "✅ Copilot-Label gefunden: $COPILOT_LABEL"
            should_approve=true
          else
            echo "❌ Keine Genehmigungsbedingung erfüllt"
          fi
          
          if [ "$should_approve" = "true" ]; then
            echo "🚀 Genehmige PR #$pr_number..."
            
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/pulls/$pr_number/reviews" \
              -d '{"event":"APPROVE","body":"🤖 Auto-approved: Author ist berechtigt oder Copilot-Label vorhanden"}'
            
            echo "✅ PR wurde automatisch genehmigt!"
          fi
