name: Auto PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR changes
        id: changes
        run: |
          # Hole die Änderungen des PRs
          git diff origin/${{ github.base_ref }}..HEAD > pr_changes.diff
          
          # Erstelle eine Zusammenfassung
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "## Geänderte Dateien:" >> $GITHUB_OUTPUT
          git diff --name-only origin/${{ github.base_ref }}..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Diff (erste 50 Zeilen):" >> $GITHUB_OUTPUT
          head -50 pr_changes.diff >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changes = `${{ steps.changes.outputs.CHANGES }}`;
            
            const reviewTemplate = `
            🤖 **Automatisches Mentor-Review**
            
            Hallo! Hier ist eine erste Einschätzung deines Pull Requests:
            
            ${changes}
            
            ---
            
            **💡 Nächste Schritte:**
            1. Nutze die GitHub Copilot Chat-Leiste rechts →
            2. Schreibe: "Bitte reviewe diesen PR nach meinen Config-Regeln"
            3. Copilot wird eine detaillierte Review auf Deutsch mit Mentor-Ton geben
            
            **🔍 Automatische Checks:**
            - [ ] Code-Stil konsistent
            - [ ] Tests vorhanden/aktualisiert
            - [ ] Dokumentation aktualisiert
            - [ ] Breaking Changes dokumentiert
            
            *Für eine detaillierte Review, nutze Copilot Chat!*
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewTemplate
            });