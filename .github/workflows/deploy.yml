name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main] 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'                
          cache: 'npm'
          cache-dependency-path: ./ui/package-lock.json

      - name: Install dependencies
        working-directory: ./ui
        run: npm ci

      - name: Build Angular App
        working-directory: ./ui
        run: npx ng build --configuration production --base-href /NoteAI/

    
      - name: Detect dist folder
        id: dist
        run: |
          set -e
          ROOT="./ui/dist"
          # Nimm den ersten Unterordner (z. B. ./ui/dist/NoteAI)
          APP_DIR=$(ls -d "$ROOT"/*/ | head -n 1)
          # Wenn es darunter einen "browser"-Ordner gibt, nimm den
          if [ -d "${APP_DIR}browser" ]; then
            DIST_DIR="${APP_DIR}browser"
          else
            DIST_DIR="${APP_DIR%/}"
          fi
          echo "DIST_DIR=$DIST_DIR" >> $GITHUB_ENV
          echo "dist_dir=$DIST_DIR" >> $GITHUB_OUTPUT
          echo "Resolved dist: $DIST_DIR"
          ls -la "$DIST_DIR"

      
      - name: Add SPA fallback (404.html)
        run: |
          cp "${{ env.DIST_DIR }}/index.html" "${{ env.DIST_DIR }}/404.html"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIST_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
